<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Theoryscope</title>
  <!-- Point cloud of texts in theory space -->
  <g fill="#1a1a1a" opacity="0.85">
    <circle cx="16" cy="18" r="1.5"/>
    <circle cx="22" cy="26" r="1.5"/>
    <circle cx="30" cy="15" r="1.5"/>
    <circle cx="38" cy="22" r="1.5"/>
    <circle cx="46" cy="18" r="1.5"/>
    <circle cx="14" cy="36" r="1.5"/>
    <circle cx="20" cy="44" r="1.5"/>
    <circle cx="28" cy="40" r="1.5"/>
    <circle cx="38" cy="44" r="1.5"/>
    <circle cx="48" cy="40" r="1.5"/>
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="42" cy="50" r="1.5"/>
    <circle cx="24" cy="52" r="1.5"/>
  </g>
  <!-- Two eigenvector axes through centroid (computed, not asserted) -->
  <g stroke="#b8941e" stroke-width="1.3" stroke-linecap="round">
    <line x1="8" y1="24" x2="56" y2="40"/>
    <line x1="22" y1="56" x2="42" y2="8"/>
  </g>
  <!-- Centroid -->
  <circle cx="32" cy="32" r="2" fill="#b8941e"/>
</svg>
